services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tcm
      POSTGRES_PASSWORD: tcm
      POSTGRES_DB: tcm_flow
      TCM_CONSULTATION_POSTGRES_DB: ${TCM_CONSULTATION_POSTGRES_DB:-tcm_consultation}
      TCM_CONSULTATION_POSTGRES_USER: ${TCM_CONSULTATION_POSTGRES_USER:tcm}
      TCM_CONSULTATION_POSTGRES_PASSWORD: ${TCM_CONSULTATION_POSTGRES_PASSWORD:tcm}
    ports:
      - "15432:5432"
    volumes:
      - tcm_flow_postgres:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcm -d tcm_flow"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - tcm_flow_elasticsearch:/usr/share/elasticsearch/data

volumes:
  tcm_flow_postgres:
  tcm_flow_elasticsearch:
